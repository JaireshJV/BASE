  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paginarion</title>

    <style>
      .main{
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
      }
      
      .content{
        display: flex;
        gap: 10px;
      }
      .button{
        border: none;
        border-radius: 5px;
        padding: 8px 14px;
      }
      .not-click{
        opacity: 0.5;
        pointer-events: none;
      }

      .prevButton{
        background: red;
        border: none;
        padding: 8px 10px;
        border-radius: 5px;
        color: white;
      }
        .nextButton{
        background: green;
        border: none;
        padding: 8px 10px;
        border-radius: 5px;
        color: white;
      }

      .active{
        background-color: violet;
        border: none;
        box-shadow: 0 0 4px 1px aquamarine;
        color:  white;
        font-weight: bold;
      }
    </style>
  </head>
  <body>

    <div class="main">
      <div id="content"></div>
      <div class="pagination">
        <button id="prevBtn" class="prevButton" onclick="prev()" id="previous">Prev</button>
        <span id="page"></span>
        <button id="nextBtn" class="nextButton" onclick="next()">Next</button>
      </div>
    </div>
    
    <script>

    ApiFetch();

      let fetchdata = [];
      let currentPage = 1;
      const itemsperPage = 10;

      function ApiFetch(){
          fetch("https://jsonplaceholder.typicode.com/posts")
          .then((res)=>res.json())
          .then((data)=> {
            fetchdata = data;
            console.log(fetchdata, "Recived Data");

            updateUI();

          })
          .catch((err)=>{
            console.log("error", err);
          })
      }

      function updateUI(){
        render();
        renderPaginate();
        updateButtons();
      }

      function getTotal(totalItems, itemsperPage){
        const totalPages = Math.ceil(totalItems/itemsperPage);
        return totalPages;
      }

      function paginate(data, currentPage, itemsperPage){
        const start = (currentPage - 1) * itemsperPage;
        const end = start + itemsperPage;
        return data.slice(start, end);
      }

      function render(){
        
        const container = document.getElementById('content');
        container.innerHTML ='';
        const data = paginate(fetchdata, currentPage, itemsperPage);
        console.log(data, "Fetched Data");

        console.log(Array.isArray(data));

        data.forEach((item)=>{
          const div = document.createElement("div");
          div.className = "content";

          const id = document.createElement("p");
          id.textContent = item.id;
          
          const title = document.createElement("p");
          title.textContent = item.title;

          div.append(id, title);
          container.appendChild(div);

        })
      }

      function next(){
        const totalPages = getTotal(fetchdata.length, itemsperPage);

        if(currentPage < totalPages){
          currentPage++;
        }
        updateUI();
      }

      function prev(){
        if(currentPage > 1){
          currentPage--
        }
        updateUI();
      }

      function renderPaginate(){
        const page = document.getElementById("page");
        page.innerHTML = "";

        const totalPages = getTotal(fetchdata.length, itemsperPage);
        
        for(let i = 1; i<=totalPages; i++){
          const btn = document.createElement("button");
          btn.textContent = i;
          btn.className = 'button'
          if(currentPage === i){
            btn.classList.add("active");
          }
          
            btn.onclick = ()=>{
              currentPage = i;
              updateUI();
            }

          page.append(btn);
        }
      }

      function updateButtons(){

       const totalPages = getTotal(fetchdata.length, itemsperPage);

       const prevBtn = document.getElementById("prevBtn");
       const nextBtn = document.getElementById("nextBtn");

       if(currentPage === 1){
          prevBtn.classList.add("not-click");
       }else{
        prevBtn.classList.remove("not-click");
       }

      if(currentPage === totalPages){
          nextBtn.classList.add("not-click");
       }else{
        nextBtn.classList.remove("not-click");
       }

      }

    </script>
  </body>
  </html>
